<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <script src="assets/js/script.js"></script>
    <title>Player</title>
</head>

<body>
    <div class="container">
        <div class="container_item">
            <div id="image_albom" class="photo photo_one"></div>
            <div class="controls">
                <div class="controls_top">
                    <div class="play" onclick="play()">
                        <img src="assets/svg/play.png" alt="play">
                    </div>
                    <div class="stop" onclick="stop()">
                        <img src="assets/svg/pause.png" alt="stop">
                    </div>
                    <div class="song">
                        <div id="autor">Beyonce</div>
                        <div id="title">Don't Hurt Yourself</div>
                    </div>
                    <div class="arrows">
                        <div class="right" onclick="next()">
                            <img src="assets/svg/forward.png" alt="right">
                        </div>
                        <div class="left" onclick="before()">
                            <img src="assets/svg/backward.png" alt="left">
                        </div>
                    </div>
                </div>
                <div class="audio">
                    <div id="start_song">0:00</div>
                    <input type="range" value="0" min="0" max="500" step="1" id="progress" onclick="otherTime()">
                    <div id="end_song">3:53</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
