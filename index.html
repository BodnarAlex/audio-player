<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <script src="assets/js/script.js"></script>
    <title>Player</title>
</head>

<body>
    <div class="container">
        <div id="first_song" class="container_item">
            <div class="photo photo_one"></div>
            <div class="controls">
                <div class="controls_top">
                    <div class="play">
                        <img src="assets/svg/play.png" alt="play">
                    </div>
                    <div class="song">
                        <div class="autor">Beyonce</div>
                        <div>Don't Hurt Yourself</div>
                    </div>
                    <div class="arrows">
                        <div class="right">
                            <img src="assets/svg/forward.png" alt="right">
                        </div>
                        <div class="left">
                            <img src="assets/svg/backward.png" alt="left">
                        </div>
                    </div>
                </div>
                <div class="audio">
                    <div class="start_song">0:00</div>
                    <input type="range" value="0" min="0" max="100" step="1" class="progress">
                    <div class="end_song">3:53</div>
                </div>
            </div>
        </div>
        <div id="second_song" class="container_item">
            <div class="photo photo_one"></div>
            <div class="controls">
                <div>
                    <div class="play"></div>
                    <div class="song">
                        <div>Dua Lipa</div>
                        <div>Don't Start Now</div>
                    </div>
                    <div class="arrows">
                        <div class="right"></div>
                        <div class="left"></div>
                    </div>
                </div>
                <div class="audio">
                    <input type="range" value="40" min="0" max="100" step="1" class="progress">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
